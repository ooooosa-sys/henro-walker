<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Henro Walker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Henro Walker — 四国八十八ヶ所</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #f3f2ee;
      --border: rgba(0,0,0,0.09);
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #3a6ea5;
      --radius: 10px;
      --font: -apple-system, 'Hiragino Sans', 'YuGothic', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
    header span { font-size: 11px; color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px 16px;
    }
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.04em; }
    .stat-value { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .map-wrap {
      margin: 0 16px 12px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 0.5px solid var(--border);
      background: var(--surface);
    }
    #map { width: 100%; height: 280px; }

    .progress-wrap { padding: 0 16px 12px; }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); margin-bottom: 5px;
    }
    .progress-track {
      height: 5px; background: var(--border);
      border-radius: 3px; overflow: hidden; margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 3px; transition: width .6s ease;
    }
    .legend {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--muted);
    }
    .legend-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }

    .next-card {
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 11px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .next-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .next-name { font-size: 13px; font-weight: 600; }
    .next-dist { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .input-row {
      padding: 0 16px 8px;
      display: flex; gap: 8px; align-items: center;
    }
    input[type="number"] {
      flex: 1; height: 40px; border-radius: var(--radius);
      border: 0.5px solid var(--border); background: white;
      padding: 0 12px; font-size: 14px; font-family: var(--font);
      -webkit-appearance: none; outline: none;
    }
    input[type="number"]:focus { border-color: var(--accent); }
    button {
      height: 40px; border-radius: var(--radius);
      border: 0.5px solid var(--border); background: white;
      padding: 0 14px; font-size: 13px; font-family: var(--font);
      cursor: pointer; white-space: nowrap; color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    button:active { background: var(--surface); }

    .date-row {
      display: flex; align-items: center;
      padding: 0 16px 10px; gap: 8px;
    }
    .date-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    input[type="date"] {
      height: 36px; border-radius: var(--radius);
      border: 0.5px solid var(--border); background: white;
      padding: 0 10px; font-size: 13px; font-family: var(--font);
      color: var(--text); outline: none;
    }
    input[type="date"]:focus { border-color: var(--accent); }

    .note {
      text-align: center; font-size: 10px; color: var(--muted);
      padding: 0 16px 8px;
      line-height: 1.6;
    }

    .history-wrap {
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 0.5px solid var(--border);
    }
    .history-header {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      border-bottom: 0.5px solid var(--border);
    }
    .history-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 0.5px solid var(--border);
      font-size: 12px;
      gap: 8px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--muted); white-space: nowrap; }
    .history-label { color: var(--muted); font-size: 10px; flex: 1; text-align: center; }
    .history-steps { font-weight: 600; white-space: nowrap; }
    .history-empty {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .reset-wrap {
      text-align: center;
      padding: 4px 16px 20px;
    }
    .reset-btn {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 11px;
      opacity: 0.5;
      cursor: pointer;
      padding: 8px 20px;
      font-family: var(--font);
      text-decoration: underline;
    }
    .reset-btn:active { opacity: 1; }

    .henro-current { background: none; border: none; }
    .henro-current svg { animation: hpulse 2.5s ease infinite; transform-origin: center; }
    @keyframes hpulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.15); opacity: 0.75; }
    }

    /* === スタート画面 === */
    .start-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none; /* JS で必要な時だけ表示 */
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s;
    }
    .start-overlay.show { display: flex; }
    .start-overlay.hide { opacity: 0; pointer-events: none; }
    .start-content {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; text-align: center; padding: 0 32px;
    }
    .start-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-top: 8px; }
    .start-subtitle { font-size: 13px; color: var(--muted); line-height: 1.8; }
    .start-btn {
      margin-top: 24px; height: 50px; padding: 0 40px;
      background: #c0392b; color: white;
      border: none; border-radius: 25px;
      font-size: 15px; font-weight: 700; font-family: var(--font);
      cursor: pointer; letter-spacing: 0.04em;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(192,57,43,0.28);
    }
    .start-btn:active { opacity: 0.82; }

    /* === 到着モーダル === */
    .arrival-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.52);
      display: flex; align-items: center; justify-content: center;
      z-index: 9000; padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .arrival-overlay.show { opacity: 1; pointer-events: auto; }
    .arrival-card {
      background: white; border-radius: 18px;
      width: 100%; max-width: 320px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      transform: scale(0.88) translateY(24px);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .arrival-overlay.show .arrival-card { transform: scale(1) translateY(0); }
    .arrival-photo-wrap {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface);
      position: relative; overflow: hidden;
    }
    .arrival-photo-state {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--muted); flex-direction: column; gap: 8px;
    }
    #arrival-photo-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    .arrival-card-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 10px; z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.38), transparent);
    }
    .arrival-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      color: white; background: #c0392b;
      padding: 3px 9px; border-radius: 20px;
    }
    .arrival-close {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,0.38); border: none; cursor: pointer;
      font-size: 13px; color: white;
      display: flex; align-items: center; justify-content: center;
      padding: 0; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .arrival-info { padding: 14px 16px 12px; }
    .arrival-num { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 2px; }
    .arrival-name { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 3px; }
    .arrival-sub { font-size: 11px; color: var(--muted); }
    .arrival-wiki { font-size: 9px; color: var(--muted); padding: 0 16px 10px; opacity: 0.5; }
    .arrival-wiki a { color: var(--muted); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>Henro Walker</h1>
  <span>四国八十八ヶ所 巡礼ウォーカー</span>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">総歩数</div><div class="stat-value" id="s-steps">0 歩</div></div>
  <div class="stat"><div class="stat-label">歩行距離</div><div class="stat-value" id="s-km">0.0 km</div></div>
  <div class="stat"><div class="stat-label">現在地</div><div class="stat-value" id="s-loc">第1番付近</div></div>
  <div class="stat"><div class="stat-label">達成率</div><div class="stat-value" id="s-pct">0.0%</div></div>
</div>

<div class="map-wrap">
  <div id="map"></div>
</div>

<div class="progress-wrap">
  <div class="progress-labels">
    <span>第1番（徳島）</span>
    <span id="s-pctlabel">0%</span>
    <span>第88番（香川）</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="sbar"></div></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3a6ea5"></div>徳島</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>高知</div>
    <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>愛媛</div>
    <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>香川</div>
  </div>
</div>

<div class="next-card">
  <div>
    <div class="next-label">次の目的地</div>
    <div class="next-name" id="s-next">第2番 極楽寺（徳島）</div>
  </div>
  <div class="next-dist" id="s-dist">出発点</div>
</div>

<div class="input-row">
  <input type="number" id="inp" placeholder="歩数を入力..." min="0" inputmode="numeric" />
  <button onclick="addManual()">追加</button>
</div>
<div class="date-row">
  <span class="date-label">日付：</span>
  <input type="date" id="inp-date" />
</div>

<div class="history-wrap">
  <div class="history-header">入力履歴</div>
  <div id="history-list" class="history-list">
    <div class="history-empty">まだ記録がありません</div>
  </div>
</div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">記録をすべてリセット</button>
</div>

<!-- お遍路スタート画面 -->
<div id="start-overlay" class="start-overlay">
  <div class="start-content">
    <svg width="72" height="72" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
      <circle cx="19" cy="19" r="18" fill="#c0392b" opacity="0.12"/>
      <circle cx="19" cy="19" r="16" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3 2"/>
      <line x1="28" y1="9" x2="30" y2="36" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
      <polygon points="19,3 6,13 32,13" fill="#c0392b" opacity="0.85"/>
      <ellipse cx="19" cy="13" rx="13" ry="1.8" fill="#c0392b"/>
      <circle cx="18" cy="18" r="4" fill="#c0392b" opacity="0.9"/>
      <path d="M13,22 L11,36 L25,36 L23,22 Z" fill="#c0392b" opacity="0.8"/>
      <line x1="23" y1="26" x2="28" y2="23" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="start-title">Henro Walker</div>
    <div class="start-subtitle">四国八十八ヶ所<br>巡礼の旅へ出発しましょう</div>
    <button class="start-btn" id="start-btn">お遍路スタート</button>
  </div>
</div>

<!-- 到着モーダル -->
<div id="arrival-overlay" class="arrival-overlay">
  <div class="arrival-card">
    <div class="arrival-photo-wrap">
      <div class="arrival-photo-state" id="arrival-photo-state">写真を読み込み中...</div>
      <img id="arrival-photo-img" alt="お寺の写真" />
      <div class="arrival-card-bar">
        <span class="arrival-badge" id="arrival-badge">到着！🎉</span>
        <button class="arrival-close" id="arrival-close-btn">✕</button>
      </div>
    </div>
    <div class="arrival-info">
      <div class="arrival-num" id="arrival-num">第1番</div>
      <div class="arrival-name" id="arrival-name">霊山寺</div>
      <div class="arrival-sub" id="arrival-sub">徳島県</div>
    </div>
    <div class="arrival-wiki" id="arrival-wiki" style="display:none">
      写真提供: <a id="arrival-wiki-link" href="https://ja.wikipedia.org" target="_blank" rel="noopener">Wikipedia</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=17"></script>
</body>
</html>
