<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="仮想お遍路" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>仮想お遍路 — 四国八十八ヶ所</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #f3f2ee;
      --border: rgba(0,0,0,0.09);
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #3a6ea5;
      --radius: 10px;
      --font: -apple-system, 'Hiragino Sans', 'YuGothic', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
    header span { font-size: 11px; color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px 16px;
    }
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.04em; }
    .stat-value { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .map-wrap {
      margin: 0 16px 12px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 0.5px solid var(--border);
      background: var(--surface);
    }
    #map { width: 100%; height: 280px; }

    .progress-wrap { padding: 0 16px 12px; }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); margin-bottom: 5px;
    }
    .progress-track {
      height: 5px; background: var(--border);
      border-radius: 3px; overflow: hidden; margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 3px; transition: width .6s ease;
    }
    .legend {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--muted);
    }
    .legend-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }

    .next-card {
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 11px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .next-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .next-name { font-size: 13px; font-weight: 600; }
    .next-dist { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .input-row {
      padding: 0 16px 8px;
      display: flex; gap: 8px; align-items: center;
    }
    input[type="number"] {
      flex: 1; height: 40px; border-radius: var(--radius);
      border: 0.5px solid var(--border); background: white;
      padding: 0 12px; font-size: 14px; font-family: var(--font);
      -webkit-appearance: none; outline: none;
    }
    input[type="number"]:focus { border-color: var(--accent); }
    button {
      height: 40px; border-radius: var(--radius);
      border: 0.5px solid var(--border); background: white;
      padding: 0 14px; font-size: 13px; font-family: var(--font);
      cursor: pointer; white-space: nowrap; color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    button:active { background: var(--surface); }
    .note {
      text-align: center; font-size: 10px; color: var(--muted);
      padding: 0 16px 8px;
      line-height: 1.6;
    }

    .history-wrap {
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 0.5px solid var(--border);
    }
    .history-header {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      border-bottom: 0.5px solid var(--border);
    }
    .history-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 0.5px solid var(--border);
      font-size: 12px;
      gap: 8px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--muted); white-space: nowrap; }
    .history-label { color: var(--muted); font-size: 10px; flex: 1; text-align: center; }
    .history-steps { font-weight: 600; white-space: nowrap; }
    .history-empty {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .reset-wrap {
      text-align: center;
      padding: 4px 16px 20px;
    }
    .reset-btn {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 11px;
      opacity: 0.5;
      cursor: pointer;
      padding: 8px 20px;
      font-family: var(--font);
      text-decoration: underline;
    }
    .reset-btn:active { opacity: 1; }

    .henro-current { background: none; border: none; }
    .henro-current .dot {
      width: 12px; height: 12px; background: #e24b4a;
      border-radius: 50%; border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .henro-current .ring {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(226,75,74,0.25);
      position: absolute; top: 0; left: 0;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.5); opacity: 0.1; }
    }
  </style>
</head>
<body>

<header>
  <h1>仮想お遍路</h1>
  <span>四国八十八ヶ所 巡礼ウォーカー</span>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">総歩数</div><div class="stat-value" id="s-steps">0 歩</div></div>
  <div class="stat"><div class="stat-label">歩行距離</div><div class="stat-value" id="s-km">0.0 km</div></div>
  <div class="stat"><div class="stat-label">現在地</div><div class="stat-value" id="s-loc">第1番付近</div></div>
  <div class="stat"><div class="stat-label">達成率</div><div class="stat-value" id="s-pct">0.0%</div></div>
</div>

<div class="map-wrap">
  <div id="map"></div>
</div>

<div class="progress-wrap">
  <div class="progress-labels">
    <span>第1番（徳島）</span>
    <span id="s-pctlabel">0%</span>
    <span>第88番（香川）</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="sbar"></div></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3a6ea5"></div>徳島</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>高知</div>
    <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>愛媛</div>
    <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>香川</div>
  </div>
</div>

<div class="next-card">
  <div>
    <div class="next-label">次の目的地</div>
    <div class="next-name" id="s-next">第2番 極楽寺（徳島）</div>
  </div>
  <div class="next-dist" id="s-dist">出発点</div>
</div>

<div class="input-row">
  <input type="number" id="inp" placeholder="歩数を入力..." min="0" inputmode="numeric" />
  <button onclick="addManual()">追加</button>
</div>

<div class="history-wrap">
  <div class="history-header">入力履歴</div>
  <div id="history-list" class="history-list">
    <div class="history-empty">まだ記録がありません</div>
  </div>
</div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">記録をすべてリセット</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=9"></script>
</body>
</html>
